<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="ISO-8859-1">

</head>
<body>
	<section>
		<!-- Start Slider  -->

		<div id="carouselExample" class="carousel slide">
			<div class="carousel-inner">
				<div class="carousel-item active">
					<img src="img/slider3.jpg" class="d-block w-100" alt="..."
						height="400px">
				</div>
				<div class="carousel-item">
					<img src="img/slider7.jpg" class="d-block w-100" alt="..."
						height="400px">
				</div>
				<div class="carousel-item">
					<img src="img/slider6.jpg" class="d-block w-100" alt="..."
						height="400px">
				</div>
			</div>
			<button class="carousel-control-prev" type="button"
				data-bs-target="#carouselExample" data-bs-slide="prev">
				<span class="carousel-control-prev-icon" aria-hidden="true"></span>
				<span class="visually-hidden">Previous</span>
			</button>
			<button class="carousel-control-next" type="button"
				data-bs-target="#carouselExample" data-bs-slide="next">
				<span class="carousel-control-next-icon" aria-hidden="true"></span>
				<span class="visually-hidden">Next</span>
			</button>
		</div>

		<!-- End Slider  -->

		<!--< Start Category Module -->
		<div class="container py-5">
			<p class="text-center fs-2 fw-bold mb-5 text-dark">Shop By
				Category</p>

			<div class="row justify-content-center g-4">

				<div class="col-lg-2 col-md-3 col-sm-4 col-5 d-flex"
					th:each="c:${category}">

					<div class="card category-card border-0 shadow w-100 text-center">

						<div class="overflow-hidden p-3">
							<img th:src="@{'/img/category_img/'+${c.imageName}}"
								class="img-fluid category-img" alt="Category Image">
						</div>

						<div class="card-body pt-0">
							<h6 class="fw-semibold text-dark mb-2">[[${c.name}]]</h6>
						</div>

						<a th:href="@{'/products?category='+${c.name}}"
							class="stretched-link"></a>

					</div>

				</div>

			</div>
		</div>

		<!-- End Category Module -->


		<!-- Start Latest Product Module -->


		<div class="container-fluid bg-light py-5">
			<p class="text-center fs-2 fw-bold mb-5 text-dark">Latest
				Products</p>

			<div class="container py-5">


				<div class="row justify-content-center g-4">

					<div class="col-lg-3 col-md-4 col-sm-6 d-flex"
						th:each="p:${products}">
						<div class="card w-100 shadow-lg border-0 product-card">

							<div class="overflow-hidden">
								<img th:src="@{'/img/product_img/'+${p.image}}"
									class="card-img-top img-fluid product-img" alt="Product Image">
							</div>

							<div class="card-body text-center">
								<h5 class="fw-semibold text-dark mb-2">[[${p.title}]]</h5>

								<a th:href="@{'/product/'+${p.id}}"
									class="btn btn-maroon btn-sm"> View Product </a>
							</div>

						</div>
					</div>

				</div>
			</div>





			<!-- End Latest Product Module -->

			<!-- NEW COLLECTION -->
			<div class="container mt-5">
				<h3 class="mb-4">New Collection</h3>
				<div class="row g-4">
					<div class="col-md-3">
						<div class="card product-card shadow">
							<img src="/img/new.jpg" class="card-img-top">
							<div class="card-body">
								<h6>Explore Now</h6>
							</div>
						</div>
					</div>
					<div class="col-md-3">
						<div class="card product-card shadow">
							<img src="/img/footwear.jpg" class="card-img-top">
							<div class="card-body">
								<h6>Explore Now</h6>
							</div>
						</div>
					</div>
					<div class="col-md-3">
						<div class="card product-card shadow">
							<img src="/img/clothing.jpg" class="card-img-top">
							<div class="card-body">
								<h6>Explore Now</h6>
							</div>
						</div>
					</div>
					<div class="col-md-3">
						<div class="card product-card shadow">
							<img src="/img/new2.jpg" class="card-img-top">
							<div class="card-body">
								<h6>Explore Now</h6>
							</div>
						</div>
					</div>
				</div>
			</div>


			<!-- Videos -->
			<div class="container mt-5">
				<h3 class="mb-4">Made with Love â¤ï¸</h3>
				<div class="row g-4">

					<div class="col-md-3">
						<div class="card product-card shadow">
							<video class="card-img-top" autoplay muted loop>
								<source src="videos/video1.mp4" type="video/mp4">
							</video>
						</div>
					</div>

					<div class="col-md-3">
						<div class="card product-card shadow">
							<video class="card-img-top" autoplay muted loop>
								<source src="videos/video2.mp4" type="video/mp4">
							</video>
						</div>
					</div>

					<div class="col-md-3">
						<div class="card product-card shadow">
							<video class="card-img-top" autoplay muted loop>
								<source src="videos/video3.mp4" type="video/mp4">
							</video>
						</div>
					</div>

					<div class="col-md-3">
						<div class="card product-card shadow">
							<video class="card-img-top" autoplay muted loop>
								<source src="videos/video4.mp4" type="video/mp4">
							</video>
						</div>
					</div>

				</div>
			</div>


			<!-- CONTACT -->
			<div class="contact-section mt-5">
				<div class="container">
					<h3>Contact Us</h3>
					<div class="row">
						<div class="col-md-6">
							<input class="form-control mb-3" placeholder="Name"> <input
								class="form-control mb-3" placeholder="Email"> <input
								class="form-control mb-3" placeholder="Phone">
							<textarea class="form-control mb-3" placeholder="Comment"></textarea>
							<button class="btn btn-danger">Send</button>
						</div>
					</div>
				</div>
			</div>
	</section>
</body>
</html>
